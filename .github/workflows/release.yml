name: Release Obsidian plugin

on:
  push:
    tags:
      # Obsidian requires the tag to equal manifest.json's version exactly, with
      # no leading "v" — so match tags that start with a digit, e.g. 1.0.1.
      - '[0-9]*'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required by actions/attest-build-provenance to sign the attestation
      # (id-token) and store it on the repository (attestations).
      id-token: write
      attestations: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version-file: .node-version

      - name: Verify tag matches manifest
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          manifest_version="$(node -p "require('./manifest.json').version")"
          if [ "$tag" != "$manifest_version" ]; then
            echo "::error::Tag '$tag' != manifest.json version '$manifest_version'."
            echo "Obsidian requires them to match exactly, with no 'v' prefix."
            exit 1
          fi
          if [ "$(node -p "require('./versions.json')['$tag'] ?? ''")" = "" ]; then
            echo "::error::versions.json has no entry for '$tag'."
            exit 1
          fi
          # Fails if CHANGELOG.md has no section for this version, so a release
          # cannot go out undocumented.
          node scripts/changelog-section.mjs "$tag" > /dev/null
          echo "Tag '$tag' matches manifest, versions.json and CHANGELOG.md."

      - name: Build plugin
        run: |
          npm ci
          npm run check

      # Records signed provenance for the release assets, so users can verify
      # they were built from this repo: gh attestation verify main.js -R <repo>
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Prepare release notes
        run: node scripts/changelog-section.mjs "$GITHUB_REF_NAME" > release-notes.md

      - name: Upload verified release artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: plugin-release
          path: |
            main.js
            manifest.json
            styles.css
            release-notes.md
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download verified release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: plugin-release
          path: release-artifacts

      - name: Create release
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: release-artifacts
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title="$GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            --draft \
            main.js manifest.json styles.css
